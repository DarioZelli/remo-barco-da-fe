<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aulas Gravadas - Barco da Fé</title>
  <link rel="stylesheet" href="causas-csm.css" />
</head>
<body>
  <header class="site-header">
    <h1>🎬 Aulas Gravadas</h1>
    <p>Conteúdos publicados para estudo e crescimento.</p>
    <p><a href="index.html">← Voltar para a Home</a></p>
  </header>

  <main style="max-width: 1100px; margin: 0 auto; padding: 1rem;">
    <section id="listaAulas" class="cards-grid"></section>
    <p id="msgAulas"></p>
  </main>

  <script>
    function escaparHtml(texto) {
      return String(texto || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    async function carregarAulas() {
      const lista = document.getElementById('listaAulas');
      const msg = document.getElementById('msgAulas');
      msg.textContent = 'Carregando...';

      try {
        const res = await fetch('/.netlify/functions/aulas-gravadas-listar');
        const data = await res.json();

        if (!res.ok) throw new Error(data.erro || 'Falha ao carregar aulas');

        const aulas = Array.isArray(data.aulas) ? data.aulas : [];

        if (!aulas.length) {
          lista.innerHTML = '';
          msg.textContent = 'Nenhuma aula publicada no momento.';
          return;
        }

        lista.innerHTML = aulas.map(aula => `
          <article class="card">
            ${aula.thumbnail ? `<img src="${escaparHtml(aula.thumbnail)}" alt="${escaparHtml(aula.titulo)}" style="width:100%; border-radius: 8px;">` : ''}
            <h3>${escaparHtml(aula.titulo)}</h3>
            <p><strong>Módulo:</strong> ${escaparHtml(aula.modulo)}</p>
            <p><strong>Professor:</strong> ${escaparHtml(aula.professor)}</p>
            <p>${escaparHtml(aula.descricao)}</p>
            <p>
              <a href="${escaparHtml(aula.linkVideo)}" target="_blank" rel="noopener">▶ Assistir aula</a>
              ${aula.pdf ? ` | <a href="${escaparHtml(aula.pdf)}" target="_blank" rel="noopener">📄 Material</a>` : ''}
            </p>
          </article>
        `).join('');

        msg.textContent = '';
      } catch (err) {
        console.error(err);
        msg.textContent = err.message || 'Erro ao carregar aulas.';
      }
    }

    carregarAulas();
  </script>
</body>
</html>
