<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status da Inscrição — REMO</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    :root{--vinho:#2C0F0F;--vinho-md:#3D1515;--vinho-lt:#5A2020;--ouro:#C9952A;--ouro-lt:#E8B84B;--ouro-pale:#F5D98B;--creme:#F5ECD7;--creme-lt:#FAF4E8}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Lato',sans-serif;background:var(--vinho);color:var(--creme);min-height:100vh}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0.9rem 3rem;background:rgba(44,15,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,149,42,0.2)}
    .nav-logo{display:flex;align-items:center;gap:0.75rem;text-decoration:none}
    .nav-logo img{height:40px;width:40px;object-fit:contain;border-radius:50%}
    .nav-logo-text{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:var(--ouro-lt);line-height:1.2}
    .nav-logo-text span{display:block;font-size:0.58rem;font-weight:400;letter-spacing:0.2em;color:var(--ouro-pale);text-transform:uppercase}
    .nav-back{font-size:0.78rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--creme);text-decoration:none;display:flex;align-items:center;gap:0.4rem;opacity:0.7;transition:opacity 0.2s}
    .nav-back:hover{opacity:1;color:var(--ouro-lt)}
    .page-hero{padding:7rem 2rem 3rem;text-align:center;position:relative;overflow:hidden}
    .page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 0%,rgba(90,32,32,0.5) 0%,transparent 70%)}
    .page-hero-content{position:relative;z-index:1}
    .page-badge{display:inline-block;font-size:0.65rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;background:var(--ouro);color:var(--vinho);padding:0.2rem 0.7rem;border-radius:2px;margin-bottom:0.8rem}
    .page-eyebrow{font-size:0.68rem;font-weight:700;letter-spacing:0.35em;text-transform:uppercase;color:var(--ouro);margin-bottom:0.8rem;display:block}
    .page-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,4vw,3.2rem);font-weight:900;color:var(--creme-lt);margin-bottom:1rem;line-height:1.1}
    .page-desc{font-size:1rem;font-weight:300;line-height:1.8;color:rgba(245,236,215,0.72);max-width:600px;margin:0 auto}
    .form-section{padding:3rem 2rem 5rem}
    .form-container{max-width:720px;margin:0 auto}
    .form-card{background:linear-gradient(135deg,rgba(61,21,21,0.9),rgba(44,15,15,0.95));border:1px solid rgba(201,149,42,0.2);border-radius:6px;padding:2.5rem;position:relative;overflow:hidden}
    .form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,transparent,var(--ouro),transparent)}
    .form-section-title{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:var(--ouro-lt);margin-bottom:1.2rem;padding-bottom:0.6rem;border-bottom:1px solid rgba(201,149,42,0.15)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.4rem}
    .form-group{margin-bottom:1.4rem}
    label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ouro);margin-bottom:0.5rem}
    input,textarea,button{width:100%;background:rgba(44,15,15,0.6);border:1px solid rgba(201,149,42,0.25);border-radius:3px;padding:0.75rem 1rem;font-family:'Lato',sans-serif;font-size:0.95rem;font-weight:300;color:var(--creme);transition:border-color 0.2s,box-shadow 0.2s;outline:none}
    input::placeholder,textarea::placeholder{color:rgba(245,236,215,0.35)}
    input:focus,textarea:focus,button:focus{border-color:var(--ouro);box-shadow:0 0 0 3px rgba(201,149,42,0.1)}
    textarea{resize:vertical;min-height:140px}
    .btn-submit{background:var(--ouro);color:var(--vinho);font-family:'Lato',sans-serif;font-size:0.85rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;border:none;padding:1rem 2rem;border-radius:3px;cursor:pointer;transition:background 0.2s,transform 0.2s;display:inline-flex;align-items:center;justify-content:center;gap:0.6rem}
    .btn-submit:hover{background:var(--ouro-lt);transform:translateY(-1px)}
    .msg{display:none;padding:1rem 1.4rem;border-radius:3px;font-size:0.92rem;margin-top:1.2rem;text-align:center}
    .msg.sucesso{background:rgba(60,120,60,0.25);border:1px solid rgba(100,200,100,0.3);color:#a0e0a0}
    .msg.erro{background:rgba(120,40,40,0.25);border:1px solid rgba(200,80,80,0.3);color:#e0a0a0}
    .resultado{margin-top:1.2rem;background:rgba(201,149,42,0.08);border:1px solid rgba(201,149,42,0.18);border-radius:4px;padding:1rem}
    .resultado strong{color:var(--ouro-lt)}
    @media(max-width:700px){nav{padding:0.9rem 1.2rem}.form-row{grid-template-columns:1fr}.form-card{padding:1.5rem}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">
      <img src="logo-remo.png" alt="REMO" />
      <div class="nav-logo-text">Remo<span>Rede Mundial de Orações</span></div>
    </a>
    <a href="candidatura.html" class="nav-back">← Voltar para inscrição</a>
  </nav>

  <section class="page-hero">
    <div class="page-hero-content">
      <span class="page-badge">Status</span>
      <span class="page-eyebrow">REMO — Escola Barco da Fé</span>
      <h1 class="page-title">Consultando sua inscrição</h1>
      <p class="page-desc">Use o ID da inscrição ou o e-mail cadastrado para ver o status atual da sua candidatura.</p>
      <div class="page-divider"></div>
    </div>
  </section>

  <section class="form-section">
    <div class="form-container">
      <div class="form-card">
        <div class="form-section-title">🔎 Ver status da inscrição</div>
        <div class="form-row">
          <div class="form-group">
            <label for="consultaIdPage">ID da inscrição</label>
            <input id="consultaIdPage" type="text" placeholder="Digite o ID da inscrição" />
          </div>
          <div class="form-group">
            <label for="consultaEmailPage">E-mail usado</label>
            <input id="consultaEmailPage" type="email" placeholder="Digite o e-mail usado" />
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="btn-submit" onclick="consultarStatus()">Consultar status</button>
          <span id="msgConsultaStatus" class="msg"></span>
        </div>
        <div id="resultadoConsultaStatus" class="resultado" style="display:none;"></div>
      </div>
    </div>
  </section>

  <footer class="page-footer" style="text-align:center;padding:2rem;border-top:1px solid rgba(201,149,42,0.1);font-size:0.78rem;color:rgba(245,236,215,0.3);">
    <p>© 2025 REMO — Rede Mundial de Orações · <a href="index.html" style="color:rgba(245,236,215,0.7);text-decoration:none;">Página inicial</a></p>
  </footer>

  <script>
    function msg(type, text) {
      const el = document.getElementById('msgConsultaStatus');
      if (!el) return;
      el.className = type === 'erro' ? 'msg erro' : 'msg sucesso';
      el.textContent = text;
      el.style.display = 'block';
    }

    async function consultarStatus() {
      const id = document.getElementById('consultaIdPage').value.trim();
      const email = document.getElementById('consultaEmailPage').value.trim();
      const feedback = document.getElementById('msgConsultaStatus');
      const resultado = document.getElementById('resultadoConsultaStatus');
      feedback.style.display = 'none';
      resultado.style.display = 'none';
      resultado.innerHTML = '';

      if (!id && !email) {
        msg('erro', 'Informe o ID da inscrição ou o e-mail para consultar.');
        return;
      }

      try {
        const params = new URLSearchParams();
        if (id) params.set('id', id);
        if (email) params.set('email', email);
        const res = await fetch('/.netlify/functions/candidaturas-buscar?' + params.toString());
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Falha ao consultar status.');
        if (!data.resultados || !data.resultados.length) {
          msg('erro', 'Nenhuma inscrição encontrada para os dados informados.');
          return;
        }
        resultado.style.display = 'block';
        resultado.innerHTML = data.resultados.map(r => `
          <div style="margin-bottom:1rem;">
            <strong>ID:</strong> ${r.id || '—'}<br/>
            <strong>Nome:</strong> ${r.nomeCompleto || '—'}<br/>
            <strong>Status:</strong> ${r.status || '—'}<br/>
            <strong>Módulo desejado:</strong> ${r.moduloDesejado || '—'}<br/>
            <strong>Módulo matriculado:</strong> ${r.moduloMatriculado || '—'}<br/>
            <strong>Nota final:</strong> ${r.notaFinal != null ? r.notaFinal : '—'}<br/>
            <strong>Última atualização:</strong> ${r.atualizadoEm || r.dataEnvio || '—'}
          </div>
        `).join('<hr style="border:none;border-top:1px solid rgba(245,236,215,0.12);margin:1rem 0;"/>');
      } catch (err) {
        msg('erro', err.message || 'Erro ao consultar status.');
      }
    }
  </script>
</body>
</html>
